site_name: mini-shawn
site_description: "私たちの採用プロセス、カルチャー、組織づくりについてのオープンドキュメント"
site_url: https://kawasho0611.github.io/mini-shawn/

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

repo_url: "https://github.com/kawasho0611/mini-shawn"
repo_name: "kawasho0611/mini-shawn"
edit_uri: "edit/main/docs/"

nav:
  - ホーム: index.md
  - コンセプト: concept/
  - 導入ガイド: install/
  - 使い方: guides/
  - 活用例: examples/
  - ナレッジ:
      - 求人票改善: knowledge/domains/recruiting/job-description.md
      - レビュー基準: knowledge/heuristics/review-criteria.md
      - 求人票改善プレイブック: knowledge/playbooks/improve-job-posting.md

plugins:
  - search:
      lang: ja
  - git-revision-date-localized:
      enable_creation_date: true
      type: date

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kawasho0611
  generator: false
